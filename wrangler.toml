name = "posso-ajudar"
type = "javascript"
main = "src/index.ts"
account_id = "2d2c1ba7bea91a6885a9ee5cd01f61bb"
workers_dev = true
compatibility_date = "2024-12-16"
compatibility_flags = ["nodejs_compat"]

# Build configuration - just compile the worker
build = { command = "echo 'Worker API is ready. See src/index.ts'" }

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "posso-ajudar-db"
database_id = "9b40bdf9-3613-477c-a3f2-f8a61f431fb1"

[env.production]
vars = { ENVIRONMENT = "production" }
[[env.production.d1_databases]]
binding = "DB"
database_name = "posso-ajudar-db"
database_id = "9b40bdf9-3613-477c-a3f2-f8a61f431fb1"

[env.staging]
vars = { ENVIRONMENT = "staging" }
[[env.staging.d1_databases]]
binding = "DB"
database_name = "posso-ajudar-db"
database_id = "9b40bdf9-3613-477c-a3f2-f8a61f431fb1"

# Observability
[observability]
enabled = true
